<!DOCTYPE html>
<!--
════════════════════════════════════════════════════════════════════════
  Rolodex — captain-contact self-service for APA members.
  v0.1 (2026-05-30). Standalone GitHub Pages, no Supabase keys client-side.

  Flow:
    1. Member enters their APA number (5 digits or 8 digits incl. 972 prefix).
    2. Page POSTs to the apa-mailer GAS endpoint with action=lookup.
    3. GAS resolves: name, masked email-on-file, list of divisions they
       play in this session for which a captain PDF has been uploaded.
    4. Page renders one button per division.
    5. On tap, page POSTs action=send → GAS fetches the PDF from R2 and
       emails it via GmailApp from soldans@southportlandmetroapa.com.
    6. Confirmation: "✓ Sent to j***@gmail.com"

  Why no Supabase keys here: GAS holds them. The public page only knows
  the GAS URL. This means rotating the anon key is a GAS-only change;
  the public page doesn't need to redeploy.

  REBRANDING:
    Change APP_NAME below in the <script> block — that's the only place
    the brand string lives. Title, header, and footer hydrate from it.
════════════════════════════════════════════════════════════════════════
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Rolodex — APA Captain Contacts</title>
<meta name="description" content="Get captain contact info for your APA divisions">
<meta name="theme-color" content="#0031a1">
<script src="version.js"></script>
<style>
  :root {
    --spm-primary: #ea002a;
    --spm-accent:  #0031a1;
    --bg:          #f3f3f3;
    --card:        #ffffff;
    --text:        #1a1a1a;
    --muted:       #6b7280;
    --border:      #e5e7eb;
    --success:     #16a34a;
    --warn:        #f59e0b;
    --danger:      #ea002a;
    --radius:      14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); }
  body { min-height: 100vh; padding-bottom: 40px; }

  .header {
    background: linear-gradient(135deg, var(--spm-primary), var(--spm-accent));
    color: #fff;
    padding: calc(18px + env(safe-area-inset-top)) 16px 16px;
    text-align: center;
  }
  .header h1 { font-size: 1.3rem; font-weight: 800; letter-spacing: 0.5px; }
  .header .sub { font-size: 0.82rem; opacity: 0.85; margin-top: 4px; }

  .container { max-width: 520px; margin: 0 auto; padding: 16px; }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 14px;
  }

  label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--spm-accent); margin-bottom: 6px; }
  input[type="text"] {
    width: 100%;
    padding: 14px;
    font-size: 1.1rem;
    border: 1px solid var(--border);
    border-radius: 10px;
    outline: none;
    font-variant-numeric: tabular-nums;
  }
  input[type="text"]:focus { border-color: var(--spm-accent); }
  .hint {
    font-size: 0.78rem; color: var(--muted);
    margin-top: 8px; line-height: 1.5;
  }
  .hint ul {
    list-style: none; padding: 0; margin: 4px 0 0;
  }
  .hint li {
    padding: 2px 0; font-variant-numeric: tabular-nums;
  }
  .hint li::before {
    content: '• '; color: var(--spm-accent); font-weight: 700;
  }
  .meta-line {
    display: flex; align-items: baseline; gap: 8px;
    flex-wrap: wrap;
    margin-top: 10px;
    font-size: 0.78rem; color: var(--muted);
  }
  .meta-line a {
    color: var(--spm-accent); font-weight: 700;
    text-decoration: none;
  }
  .meta-line a:hover { text-decoration: underline; }

  .btn {
    width: 100%;
    background: var(--spm-accent); color: #fff;
    border: 0; border-radius: 10px;
    padding: 14px;
    font-size: 1rem; font-weight: 800; letter-spacing: 0.3px;
    cursor: pointer;
    margin-top: 12px;
  }
  .btn:active { filter: brightness(1.08); }
  .btn[disabled] { opacity: 0.6; cursor: not-allowed; }

  /* Member identity block at top of divisions card */
  .member-head {
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }
  .member-name {
    font-weight: 800; font-size: 1.1rem;
    color: var(--spm-accent);
    line-height: 1.2;
  }
  .member-session {
    font-size: 0.82rem; color: var(--muted);
    margin-top: 2px;
  }

  /* "PDFs go to ..." chip */
  .send-target {
    display: flex; align-items: center; gap: 10px;
    background: #f8faff;
    border: 1px solid #dbe7ff;
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 0.86rem; color: var(--text);
    margin-bottom: 14px;
    line-height: 1.4;
  }
  .send-target .send-icon { font-size: 1.15rem; flex-shrink: 0; }
  .send-target strong { color: var(--spm-accent); font-variant-numeric: tabular-nums; }

  /* Prompt above division buttons */
  .divisions-prompt {
    font-size: 0.84rem; font-weight: 700; color: var(--text);
    margin-bottom: 6px;
  }

  .btn-div {
    width: 100%;
    background: var(--card); color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    text-align: left;
    font-weight: 700; font-size: 0.95rem;
    cursor: pointer;
    margin-top: 8px;
    display: flex; align-items: center; gap: 10px;
  }
  .btn-div:hover { border-color: var(--spm-accent); }
  .btn-div .div-icon { font-size: 1.2rem; flex-shrink: 0; }
  .btn-div .div-meta { font-size: 0.74rem; color: var(--muted); font-weight: 500; margin-top: 2px; }
  .btn-div:disabled { opacity: 0.5; cursor: wait; }
  .btn-div.sent { background: #eef9f1; border-color: var(--success); }
  .btn-div.sent .div-icon { color: var(--success); }

  .status {
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 0.88rem;
    margin-top: 10px;
    line-height: 1.45;
  }
  .status.err  { background: #fde8ec; color: var(--danger); }
  .status.ok   { background: #eef9f1; color: var(--success); }
  .status.info { background: #eef4ff; color: var(--spm-accent); }
  .status a {
    color: inherit; font-weight: 700;
    text-decoration: underline;
  }

  .footer {
    text-align: center; padding: 20px 16px;
    font-size: 0.72rem; color: var(--muted);
  }
</style>
</head>
<body>

<div class="header">
  <h1 id="appName">Rolodex</h1>
  <div class="sub">Captain contacts for South Portland Metro APA divisions</div>
</div>

<div class="container">

  <div class="card" id="lookupCard">
    <label for="apaInput">Your APA number or email</label>
    <input type="text" id="apaInput" inputmode="email" autocomplete="email"
           placeholder="e.g. 12345 or you@example.com" maxlength="80">
    <div class="hint">
      Any of these work:
      <ul>
        <li>5-digit member number (e.g. <strong>12345</strong>)</li>
        <li>8-digit member number (e.g. <strong>97212345</strong>)</li>
        <li>Email address on file with APA</li>
      </ul>
    </div>
    <button class="btn" id="lookupBtn">Look up my divisions</button>
    <div id="lookupStatus"></div>
  </div>

  <div class="card" id="divisionsCard" style="display:none">
    <div class="member-head">
      <div class="member-name" id="memberName">—</div>
      <div class="member-session" id="sessionLabel"></div>
    </div>

    <div class="send-target">
      <span class="send-icon">📨</span>
      <span>PDFs are emailed to <strong id="maskedEmail">—</strong></span>
    </div>

    <div class="divisions-prompt">Tap a division to send it now:</div>

    <div id="divisionList"></div>
  </div>

</div>

<div class="footer">
  <span>South Portland Metro APA &middot; <a href="https://southportlandmetroapa.github.io/" style="color:var(--muted)">home</a></span><br>
  <span>v<span id="vBadge">0.1</span></span>
</div>

<script>
const APP_NAME = 'Rolodex';

/* The apa-mailer GAS deploy URL. UPDATE AFTER DEPLOY.
   Format: https://script.google.com/macros/s/AKfy.../exec
   See tools/claude/rolodex-mailer/README.md for the deploy steps. */
const MAILER_URL = 'https://script.google.com/macros/s/AKfycbzGTzkBRTrIIP_tD6sbtOOUmNZkXDdtxPoO4c8fdWt5h3tZFueNSISPv8Q3LWStx73Whw/exec';

document.title = APP_NAME;
document.getElementById('appName').textContent = APP_NAME;
document.getElementById('vBadge').textContent = window.APP_VERSION || '0.1';

const $ = sel => document.querySelector(sel);
function setStatus(el, msg, kind) {
  el.innerHTML = msg ? '<div class="status ' + (kind || 'info') + '">' + msg + '</div>' : '';
}

async function callMailer(payload) {
  if (!MAILER_URL || MAILER_URL.indexOf('<<') === 0) {
    throw new Error('Mailer is not configured yet. Try again in a few minutes.');
  }
  /* GAS Web Apps: POST with text/plain so the request is "simple" and
     skips CORS preflight (which GAS doesn't handle). The body is still
     JSON; the GAS doPost() parses e.postData.contents as JSON. */
  const r = await fetch(MAILER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify(payload),
    redirect: 'follow'
  });
  const txt = await r.text();
  let data;
  try { data = JSON.parse(txt); }
  catch (_) { throw new Error('Bad response from mailer (' + r.status + ')'); }
  if (!data.ok) throw new Error(data.error || 'Lookup failed.');
  return data;
}

let _state = { apaNumber: null, divisions: [] };

async function doLookup() {
  const btn   = $('#lookupBtn');
  const input = $('#apaInput');
  const raw   = input.value.trim();
  if (!raw) { setStatus($('#lookupStatus'), 'Enter your APA number or email first.', 'err'); return; }

  /* Validation branches by shape:
       - Contains @ → treat as email, light syntax check
       - Otherwise → digits-only, must be 5 or 8 chars
     The GAS endpoint's papertrail_lookup_player RPC accepts either, so
     we just pass the user input through after this light pre-check. */
  let identifier;
  if (raw.indexOf('@') >= 0) {
    /* Email path */
    if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(raw)) {
      setStatus($('#lookupStatus'), 'That doesn\'t look like a valid email.', 'err');
      return;
    }
    identifier = raw.toLowerCase();
  } else {
    /* APA-number path */
    const digits = raw.replace(/[^0-9]/g, '');
    if (digits.length !== 5 && digits.length !== 8) {
      setStatus($('#lookupStatus'), 'APA number should be 5 or 8 digits (or use your email).', 'err');
      return;
    }
    identifier = digits;
  }
  btn.disabled = true;
  btn.textContent = 'Looking up…';
  setStatus($('#lookupStatus'), '', '');
  try {
    /* `apa_number` is the historical field name on the GAS endpoint; the
       RPC actually accepts an email there too. Keeping the field name
       avoids a deploy on the GAS side. */
    const data = await callMailer({ action: 'lookup', apa_number: identifier });
    _state.apaNumber = identifier;
    _state.divisions = data.divisions;

    $('#memberName').textContent  = data.name || '(member)';
    $('#maskedEmail').textContent = data.maskedEmail || '(unknown)';
    $('#sessionLabel').textContent = data.sessionName ? '· ' + data.sessionName : '';

    const list = $('#divisionList');
    if (!data.divisions || !data.divisions.length) {
      const leagueLink = '<a href="mailto:southportlandmetroapa@gmail.com?subject=Rolodex%20captain%20access">' +
                          'southportlandmetroapa@gmail.com</a>';
      if (data.notCaptain) {
        list.innerHTML = '<div class="status info">' +
          '<strong>Captain contacts are restricted to South Portland Metro APA division captains.</strong><br>' +
          'You\'re rostered on a team this session, but not as the captain of an SPM division.<br><br>' +
          'If you think this is wrong, email ' + leagueLink + '.' +
          '</div>';
      } else {
        list.innerHTML = '<div class="status info">' +
          '<strong>No SPM captain PDFs uploaded yet.</strong><br>' +
          'Check back later.<br><br>' +
          'If you think this is wrong, email ' + leagueLink + '.' +
          '</div>';
      }
    } else {
      list.innerHTML = data.divisions.map((d, i) => (
        '<button class="btn-div" data-idx="' + i + '">' +
          '<span class="div-icon">📨</span>' +
          '<span style="flex:1">' +
            '<div>' + escHtml(d.division_name || '(division)') + '</div>' +
            '<div class="div-meta">Division ' + escHtml(d.division_number) +
              (d.format ? ' · ' + escHtml(d.format) : '') +
              (d.night_of_play ? ' · ' + escHtml(d.night_of_play) : '') +
            '</div>' +
          '</span>' +
        '</button>'
      )).join('');
      list.querySelectorAll('.btn-div').forEach(b => {
        b.addEventListener('click', () => doSend(+b.dataset.idx, b));
      });
    }

    $('#divisionsCard').style.display = '';
  } catch (e) {
    setStatus($('#lookupStatus'), escHtml(e.message), 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Look up my divisions';
  }
}

/* Must match the GAS RATE_LIMIT_SECONDS constant in apa-mailer/Code.gs.
   The mailer rejects any send within this window with "Please wait a few
   seconds...". Mirroring it here lets us disable the buttons proactively
   so the user never sees that error. If the GAS constant changes, bump
   this too. */
const RATE_LIMIT_SECONDS = 15;

/* Throttle state — shared across all division buttons. Buttons that
   haven't been successfully sent yet get a per-second countdown
   ("Try again in 12s") and re-enable when the window expires.
   Already-sent buttons stay in the ✓ state and don't take the lockdown. */
let _throttleUntil = 0;
let _throttleTimer = null;

function rolApplyThrottle(remainingMs) {
  if (_throttleTimer) { clearInterval(_throttleTimer); _throttleTimer = null; }
  _throttleUntil = Date.now() + remainingMs;
  const tick = () => {
    const remain = Math.max(0, Math.ceil((_throttleUntil - Date.now()) / 1000));
    document.querySelectorAll('.btn-div').forEach(b => {
      if (b.classList.contains('sent')) return;   /* sticky ✓ state */
      const meta = b.querySelector('.div-meta');
      if (remain > 0) {
        b.disabled = true;
        if (meta && !b.dataset.origMeta) b.dataset.origMeta = meta.innerHTML;
        if (meta) meta.innerHTML = 'Available again in ' + remain + 's…';
      } else {
        b.disabled = false;
        if (meta && b.dataset.origMeta) meta.innerHTML = b.dataset.origMeta;
        delete b.dataset.origMeta;
      }
    });
    if (remain <= 0) {
      clearInterval(_throttleTimer);
      _throttleTimer = null;
    }
  };
  tick();
  _throttleTimer = setInterval(tick, 1000);
}

async function doSend(idx, btnEl) {
  const d = _state.divisions[idx];
  if (!d) return;
  /* If still throttled (e.g. server-issued retry-after), refuse client-side. */
  if (Date.now() < _throttleUntil) return;

  const orig = btnEl.innerHTML;
  btnEl.disabled = true;
  btnEl.innerHTML = '<span class="div-icon">⏳</span>' +
    '<span style="flex:1"><div>Sending…</div>' +
    '<div class="div-meta">' + escHtml(d.division_name) + '</div></span>';
  try {
    const data = await callMailer({
      action: 'send',
      apa_number: _state.apaNumber,
      division_id: d.division_id
    });
    btnEl.classList.add('sent');
    btnEl.innerHTML = '<span class="div-icon">✓</span>' +
      '<span style="flex:1"><div>Sent to ' + escHtml(data.sentTo) + '</div>' +
      '<div class="div-meta">' + escHtml(d.division_name) + '</div></span>';
    /* Start the per-APA cooldown so subsequent division buttons can't
       race the GAS rate-limit. Successful sends consume the quota. */
    rolApplyThrottle(RATE_LIMIT_SECONDS * 1000);
  } catch (e) {
    btnEl.innerHTML = orig;
    btnEl.disabled = false;
    setStatus($('#lookupStatus'), escHtml(e.message), 'err');
    /* If the GAS already rate-limited us (e.g. fresh page-load within
       the prior cooldown), respect it client-side too. The message text
       is the canonical signal. */
    if (/wait.*seconds?/i.test(String(e.message))) {
      rolApplyThrottle(RATE_LIMIT_SECONDS * 1000);
    }
  }
}

function escHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

/* Remember the APA number across visits (matches PaperTrail / RedTape / etc.
   On page load: restore + auto-lookup. On successful lookup: persist. */
const REMEMBER_KEY = 'rolodex_apa_v1';

function rememberApa(apa) {
  try { localStorage.setItem(REMEMBER_KEY, apa); } catch (_) {}
}
function recallApa() {
  try { return localStorage.getItem(REMEMBER_KEY) || ''; } catch (_) { return ''; }
}
function forgetApa() {
  try { localStorage.removeItem(REMEMBER_KEY); } catch (_) {}
}

const _origDoLookup = doLookup;
doLookup = async function() {
  await _origDoLookup();
  /* Persist whatever was typed if it passes our pre-check (digits OR
     email shape). `_state.apaNumber` was set inside _origDoLookup
     post-validation, so use that as the canonical form. */
  if (_state.apaNumber) rememberApa(_state.apaNumber);
};

$('#lookupBtn').addEventListener('click', doLookup);
$('#apaInput').addEventListener('keypress', e => {
  if (e.key === 'Enter') doLookup();
});

/* Strip whitespace as the user types / pastes. For digit-shape input
   (no '@'), strip ALL whitespace including internal — APA numbers never
   contain spaces. For email-shape input (has '@'), strip only leading
   whitespace so they can still type a real address. On blur, also trim
   trailing whitespace for the email case. */
$('#apaInput').addEventListener('input', e => {
  const v = e.target.value;
  const hasAt = v.indexOf('@') >= 0;
  const cleaned = hasAt
    ? v.replace(/^\s+/, '')              // emails: strip leading only
    : v.replace(/\s+/g, '');             // digits: strip ALL whitespace
  if (v !== cleaned) {
    /* Preserve caret position so we don't fight the user mid-typing */
    const pos = Math.max(0, e.target.selectionStart - (v.length - cleaned.length));
    e.target.value = cleaned;
    try { e.target.setSelectionRange(pos, pos); } catch (_) {}
  }
});
$('#apaInput').addEventListener('blur', e => {
  e.target.value = e.target.value.trim();
});

/* Restore + auto-lookup if we remember an APA. Renders a dedicated
   "Not you?" affordance in its own meta-line BELOW the helper text
   (rather than tacked onto the same paragraph) so the link doesn't
   get lost in the prose. */
(function bootRemember() {
  const remembered = recallApa();
  if (remembered) {
    $('#apaInput').value = remembered;
    /* Insert a separate meta-line, not into the hint paragraph */
    const hint = document.querySelector('.hint');
    if (hint && !document.getElementById('notYouMeta')) {
      const meta = document.createElement('div');
      meta.className = 'meta-line';
      meta.id = 'notYouMeta';
      meta.innerHTML = 'Saved from a previous visit. <a href="#" id="forgetMeLink">Not you?</a>';
      hint.parentNode.insertBefore(meta, hint.nextSibling);
      document.getElementById('forgetMeLink').addEventListener('click', e => {
        e.preventDefault();
        forgetApa();
        $('#apaInput').value = '';
        $('#divisionsCard').style.display = 'none';
        $('#apaInput').focus();
        meta.style.display = 'none';
      });
    }
    /* Auto-fire lookup on a microtask so the page paints first. */
    setTimeout(doLookup, 50);
  } else {
    $('#apaInput').focus();
  }
})();
</script>
</body>
</html>
